#
# Save and restore all video memory allocations.
options nvidia NVreg_PreserveVideoMemoryAllocations=2
#
# The destination should not be using tmpfs, so we prefer
# /var/tmp instead of /tmp
options nvidia NVreg_TemporaryFilePath=/var/tmp
#
# Enable kernel suspend notifiers for open modules,
# the kernel handles video memory preservation directly
options nvidia NVreg_UseKernelSuspendNotifiers=1
#
# Enable Runtime D3 Power Management
options nvidia NVreg_EnableS0ixPowerManagement=1
