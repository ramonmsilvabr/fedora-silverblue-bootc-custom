name: Buildar imagem

on:
  schedule:
    - cron: '0 0 * * *' # Constrói as 0:00
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
  workflow_dispatch: # Permite rodar manualmente
env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  REGISTRY: ghcr.io/${{ github.repository_owner }}


jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Suporte a Secure Boot
        run: |
            mkdir -p .anchor
            echo "${{ secrets.SECURE_BOOT_KEY }}" | base64 --decode > .anchor/akmods.priv
            echo "${{ secrets.SECURE_BOOT_CERT }}" | base64 --decode > .anchor/akmods.der
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile # Ou Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
