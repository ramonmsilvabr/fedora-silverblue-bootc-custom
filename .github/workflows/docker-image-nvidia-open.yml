name: nvidia-open build

on:
  schedule:
    - cron: '0 6 * * *' # Constrói as 6:00
  workflow_dispatch:
    inputs:
      fedora_version:
        description: 'Versão do Fedora Silverblue'
        default: '44'
        required: false

env:
  IMAGE_NAME: fedora-silverblue-bootc-custom-nvidia-open
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      SELECTED_VERSION: ${{ github.event.inputs.fedora_version || '44' }}
      DEFAULT_VERSION: '44'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Gerar metadados do build
        id: meta
        run: |
          VERSION=${{ env.SELECTED_VERSION }}
          DATE=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PRIMARY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${DATE}"

          echo "version=${VERSION}"     >> $GITHUB_OUTPUT
          echo "date=${DATE}"           >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "primary=${PRIMARY}"     >> $GITHUB_OUTPUT

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Suporte a Secure Boot
        env:
          CERTIFICATE_BASE64: ${{ secrets.SECURE_BOOT_CERT }}
          PRIVATEKEY_BASE64: ${{ secrets.SECURE_BOOT_KEY }}
        run: |
            mkdir -p .anchor
            echo -n "$CERTIFICATE_BASE64" | base64 --decode > .anchor/akmods.der
            echo -n "$PRIVATEKEY_BASE64" | base64 --decode > .anchor/akmods.priv

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nvidia-open/Containerfile
          push: true
          build-args: |
            FEDORA_VERSION=${{ env.SELECTED_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SELECTED_VERSION }}
            
      - name: Aplicar tags adicionais via skopeo
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          CREDS="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          TAGS=()
          TAGS+=("${VERSION}")
          TAGS+=("sha-${SHORT_SHA}")
          if [ "${{ env.SELECTED_VERSION }}" -gt "${{ env.DEFAULT_VERSION }}" ]; then
            TAGS+=("beta")
          elif [ "${{ env.SELECTED_VERSION }}" -eq "${{ env.DEFAULT_VERSION }}" ]; then
            TAGS+=("latest")
          elif [ "${{ env.SELECTED_VERSION }}" -lt "${{ env.DEFAULT_VERSION }}" ]; then
            TAGS+=("old")
          fi
          for TAG in "${TAGS[@]}"; do
            skopeo copy \
              --src-creds  "${CREDS}" \
              --dest-creds "${CREDS}" \
              "docker://${{ steps.meta.outputs.primary }}" \
              "docker://${BASE}:${TAG}"
          done
